<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard</title>
    <link rel="stylesheet" href="/dash.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>
    <header>
        <h1>Dashboard</h1>
        <h2>level: <span id="level"> loading... <i class="fa-solid fa-spinner fa-spin-pulse"></i> </span></h2>
        <a class="logout" href="/logout">Logout</a>
    </header>

    <main class="container">
        <section class="cards">
            <div class="card">
                Username
                <span id="username">Loading... <i class="fa-solid fa-spinner fa-spin-pulse"></i></span>
            </div>

            <div class="card">
                User ID
                <span id="userId">Loading... <i class="fa-solid fa-spinner fa-spin-pulse"></i></span>
            </div>

            <div class="card">
                Plan
                <span id="plan">Loading... <i class="fa-solid fa-spinner fa-spin-pulse"></i></span>
            </div>
        </section>

        <section class="section">
            <h2>Post a new task</h2>
            <span id="taskmsg"></span>
            <form id="taskForm">
                <input type="text" id="taskTitle" placeholder="Task title" required />

                <textarea id="taskDescription" placeholder="Task description" rows="4"></textarea>

                <button id="submit1" type="submit">Post Task</button>
            </form>
        </section>

        <section class="section">
            <div class="tasks1">
                <h2 id="postedtask" >Posted tasks</h2>
                <button id="atualizar">atualizar</button>
            </div>
            <div id="tasksList">
                <div class="task">
                    <h3 class="task-title">Loading... </h3>
                    <p class="task-desc">Loading...</p>
                </div>
              
            </div>
        </section>
    </main>
   <div class="info">
    <h2>info</h2>
    <p>Para entrar pro favor se registre</p>
   </div>
    <script src="/dash.js"></script>
</body>

</html>
